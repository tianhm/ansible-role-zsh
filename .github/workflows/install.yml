---
name: install-script

"on":
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4

      - name: Lint install scripts
        run: shellcheck install.sh install-macos.sh

  install:
    name: "install.sh: ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4

      - name: Run install.sh
        run: bash install.sh

      - name: Verify zsh is installed and configured
        run: |
          command -v zsh
          test -f "$HOME/.zshrc"
          grep -qi antigen "$HOME/.zshrc"
