---
# Render the starship.toml config (used when zsh_theme == 'starship').
# Split from starship.yml so it runs under the `configure` tag like the rest of
# the role's config (configure.yml), while the binary install stays on `install`.
# Managed only when zsh_starship_manage_config.

- name: Ensure ~/.config directory is present
  become: true
  become_user: "{{ zsh_user }}"
  ansible.builtin.file:
    path: "~{{ zsh_user }}/.config"
    owner: "{{ zsh_user }}"
    group: "{{ zsh_user_group }}"
    mode: u=rwx,g=rx,o=rx
    state: directory
  when: zsh_starship_manage_config

# Generated preset path: render the preset to a staging file, then deep-merge the
# optional user override file and inline override over it (precedence, low -> high:
# generated preset -> user file -> inline var). The merge runs at provision time
# because starship itself reads a single file and cannot merge configs.
# The merge helper and staging files are kept (not deleted) so re-runs stay idempotent.

- name: Install starship.toml merge helper
  become: true
  become_user: "{{ zsh_user }}"
  ansible.builtin.copy:
    src: merge_starship_toml.py
    dest: "~{{ zsh_user }}/.config/.starship-merge.py"
    owner: "{{ zsh_user }}"
    group: "{{ zsh_user_group }}"
    mode: "0755"
  when: zsh_starship_manage_config and not zsh_starship_config

- name: Render generated starship.toml preset (staging)
  become: true
  become_user: "{{ zsh_user }}"
  ansible.builtin.template:
    src: starship.toml.j2
    dest: "~{{ zsh_user }}/.config/.starship.generated.toml"
    owner: "{{ zsh_user }}"
    group: "{{ zsh_user_group }}"
    mode: "0644"
  when: zsh_starship_manage_config and not zsh_starship_config

- name: Check for user starship override file
  become: true
  become_user: "{{ zsh_user }}"
  ansible.builtin.stat:
    path: "{{ zsh_starship_config_user_file }}"
  register: zsh_starship_user_file_stat
  when: zsh_starship_manage_config and not zsh_starship_config and zsh_starship_config_user_file | length > 0

- name: Stage inline starship override
  become: true
  become_user: "{{ zsh_user }}"
  ansible.builtin.copy:
    content: "{{ zsh_starship_config_user }}"
    dest: "~{{ zsh_user }}/.config/.starship.user-inline.toml"
    owner: "{{ zsh_user }}"
    group: "{{ zsh_user_group }}"
    mode: "0644"
  when: zsh_starship_manage_config and not zsh_starship_config and zsh_starship_config_user | length > 0

- name: Deep-merge starship config (preset + user file + inline override)
  become: true
  become_user: "{{ zsh_user }}"
  ansible.builtin.command: >-
    python3 ~/.config/.starship-merge.py
    ~/.config/.starship.generated.toml
    {% if zsh_starship_user_file_stat.stat.exists | default(false) %} {{ zsh_starship_config_user_file }}{% endif %}
    {% if zsh_starship_config_user | length > 0 %} ~/.config/.starship.user-inline.toml{% endif %}
  register: zsh_starship_merged
  changed_when: false
  check_mode: false
  when: zsh_starship_manage_config and not zsh_starship_config

- name: Write merged starship.toml
  become: true
  become_user: "{{ zsh_user }}"
  ansible.builtin.copy:
    content: "{{ zsh_starship_merged.stdout }}\n"
    dest: "~{{ zsh_user }}/.config/starship.toml"
    owner: "{{ zsh_user }}"
    group: "{{ zsh_user_group }}"
    mode: "0644"
    backup: true
  when: zsh_starship_manage_config and not zsh_starship_config

- name: Write verbatim starship.toml override
  become: true
  become_user: "{{ zsh_user }}"
  ansible.builtin.copy:
    content: "{{ zsh_starship_config }}"
    dest: "~{{ zsh_user }}/.config/starship.toml"
    owner: "{{ zsh_user }}"
    group: "{{ zsh_user_group }}"
    mode: "0644"
    backup: true
  when: zsh_starship_manage_config and zsh_starship_config | length > 0
