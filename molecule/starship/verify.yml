---
# Molecule ansible verifier for the starship theme path.
# Asserts the starship binary is installed and on PATH, that .zshrc activates
# starship and contains no powerlevel10k wiring, and that the generated
# ~/.config/starship.toml exists and is non-empty.
- name: Verify
  hosts: all
  gather_facts: false
  vars:
    zshrc_path: /root/.zshrc
    starship_toml_path: /root/.config/starship.toml
  tasks:
    - name: Check starship binary is on PATH
      command: which starship
      changed_when: false
      register: starship_which

    - name: Assert starship binary was found
      assert:
        that:
          - starship_which.rc == 0
          - starship_which.stdout | length > 0
        fail_msg: "starship binary not found on PATH"

    - name: Get starship version
      command: starship --version
      changed_when: false
      register: starship_version

    - name: Assert starship --version succeeds
      assert:
        that:
          - starship_version.rc == 0
          - "'starship' in starship_version.stdout"
        fail_msg: "starship --version did not succeed"

    - name: Read rendered .zshrc
      slurp:
        src: "{{ zshrc_path }}"
      register: zshrc_slurp

    - name: Set zshrc content fact
      set_fact:
        zshrc_content: "{{ zshrc_slurp.content | b64decode }}"

    - name: Assert .zshrc activates starship
      assert:
        that:
          - "'starship init zsh' in zshrc_content"
          - "'STARSHIP_CONFIG' in zshrc_content"
        fail_msg: ".zshrc does not contain starship activation"

    - name: Assert .zshrc has no powerlevel10k wiring
      assert:
        that:
          - "'POWERLEVEL9K_' not in zshrc_content"
          - "'p10k-instant-prompt' not in zshrc_content"
          - "'antigen theme' not in zshrc_content"
          - "'.p10k.zsh' not in zshrc_content"
        fail_msg: ".zshrc still contains powerlevel10k wiring on the starship path"

    - name: Stat generated starship.toml
      stat:
        path: "{{ starship_toml_path }}"
      register: starship_toml_stat

    - name: Assert starship.toml exists and is non-empty
      assert:
        that:
          - starship_toml_stat.stat.exists
          - starship_toml_stat.stat.size > 0
        fail_msg: "~/.config/starship.toml is missing or empty"
